<style>

  header { grid-area:header; display:flex; align-items:center; justify-content:space-between; padding:14px 24px; border-bottom:1px solid var(--border); background:var(--ink); color:var(--paper); gap:12px; }
  .logo { font-family:'DM Serif Display',serif; font-size:1rem; flex-shrink:0; }

  .proj-wrap { flex:1; display:flex; align-items:center; gap:6px; flex-wrap:wrap; overflow:hidden; }
  .proj-pill { display:flex; align-items:center; gap:5px; padding:4px 10px; border-radius:2px; border:1px solid #3a3a3a; background:#1a1a1a; font-family:'DM Mono',monospace; font-size:0.6rem; cursor:pointer; color:var(--paper); transition:all 0.15s; white-space:nowrap; }

  .hdr-actions { display:flex; gap:6px; flex-shrink:0; }
  .hdr-btn { padding:5px 10px; font-family:'DM Mono',monospace; font-size:0.58rem; border:1px solid #3a3a3a; background:transparent; color:#a09888; border-radius:2px; cursor:pointer; transition:all 0.15s; }
  .hdr-btn:hover { background:#1e1e1e; color:var(--paper); }
  .hdr-btn.red { border-color:var(--accent); color:#f5b8a0; }
  .hdr-btn.red:hover { background:var(--accent); color:#fff; }
  aside { grid-area:sidebar; border-right:1px solid var(--border); background:var(--surface); overflow-y:auto; padding:18px 14px; display:flex; flex-direction:column; gap:20px; }

  .send-btn { padding:10px 16px; background:var(--ink); color:var(--paper); border:none; font-family:'DM Mono',monospace; font-size:0.68rem; cursor:pointer; border-radius:3px; transition:background 0.15s; height:42px; }

  footer { grid-area:footer; border-top:1px solid var(--border); background:var(--ink); padding:9px 24px; display:flex; align-items:center; justify-content:space-between; color:var(--muted); font-size:0.58rem; letter-spacing:0.07em; }

  .mbtn:hover { background:var(--warm); }
  .mbtn.primary { background:var(--ink); color:var(--paper); border-color:var(--ink); }

  .mbtn.danger { border-color:#d04020; color:var(--accent); }

  .fl { display:block; font-size:0.58rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }

  .mtabs { display:flex; gap:3px; margin-bottom:14px; }

<script>
// ═══════════════════════════ SUPABASE ═══════════════════════════
const SB_URL = 'https://gmttqlxqvqdukuspghoc.supabase.co';
const SB_KEY = 'sb_publishable_J-h6m1YD8Ad4nCE5IMKZcw_SZfQd4Ep';

async function sbRequest(method, table, body, filters) {
  let url = SB_URL + '/rest/v1/' + table + '?select=*';
  if (filters) url += '&' + filters;
  const headers = { 'Content-Type':'application/json', 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY };
  if (method === 'POST') headers['Prefer'] = 'resolution=merge-duplicates';
  if (method === 'DELETE') url = SB_URL + '/rest/v1/' + table + (filters ? '?' + filters : '');
  try {
    const r = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
    const d = await r.json().catch(() => null);
    return { data: d, error: r.ok ? null : d };
  } catch(e) { return { data: null, error: e }; }
}

async function init() {
  renderColorPicker();
  renderProjSwitcher(); // sofort rendern mit Builtin-Projekten
  showWelcome();
  // Supabase im Hintergrund
  try {
    const { data, error } = await sbRequest('GET', 'projects', null, 'order=created_at.asc');
    if (!error && data && Array.isArray(data)) {
      data.forEach(p => { customProjs[p.id] = {...p, builtin:false, tensions:p.tensions||[], tv:p.tension_values||[]}; });
      renderProjSwitcher();
    }
    setStatus('ok', 'Verbunden · Supabase');
  } catch(e) { setStatus('err', 'Offline — nur Builtin-Projekte'); }
}

function setStatus(state, text) {
  document.getElementById('sdot').className = 'sdot ' + state;
  document.getElementById('ftr-mode').textContent = text;
}

function showWelcome() {
  document.getElementById('conv').innerHTML = `<div class="msg ai">
    <div class="av av-ai">SM</div>
    <div class="msg-body">
      <div class="msg-meta">Sparring Machine · Start</div>
      <div class="bubble"><div class="ltag lt-why">WHY — Identitätskern</div>Projekt wählen — oben in der Leiste. Dann gehts los.</div>
      <div class="chips">
        <button class="chip cw" onclick="selectProj('demeter')">→ DEMETER öffnen</button>
        <button class="chip ch" onclick="openNewProjModal()">→ Neues Projekt anlegen</button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════ PROJECTS ═══════════════════════════
function allProjs() { return [...Object.values(BP), ...Object.values(customProjs)]; }
function getProj(id) { return BP[id] || customProjs[id] || null; }

function renderProjSwitcher() {
  const wrap = document.getElementById('proj-wrap');
  wrap.innerHTML = '';
  allProjs().forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'proj-pill' + (p.id === curProj ? ' active' : '');
    btn.innerHTML = `<span class="proj-dot" style="background:${p.color}"></span>${p.name}`;
    btn.onclick = () => selectProj(p.id);
    if (!p.builtin) btn.ondblclick = (e) => { e.stopPropagation(); openEditProjModal(p.id); };
    wrap.appendChild(btn);
  });
  const add = document.createElement('button');
  add.className = 'new-proj'; add.textContent = '+ Projekt'; add.onclick = openNewProjModal;
  wrap.appendChild(add);
}

async function selectProj(id) {
  if (curProj === id) return;
  curProj = id; curSess = null; history = [];
  setMode('sparring');
  renderProjSwitcher(); renderTensionMap(); renderCtxBlock();
  await loadSessMeta(); renderSessList(); renderNewSessWelcome();
  document.getElementById('ftr-mode').textContent = getProj(id).name + ' · Strategisches Sparring';
}

function renderTensionMap() {
  const el = document.getElementById('tension-map');
  const p = getProj(curProj);
  if (!p || !p.tensions || !p.tensions.length) { el.innerHTML = '<div style="font-size:0.58rem;color:var(--muted)">Keine Spannungen definiert.</div>'; return; }
  el.innerHTML = p.tensions.map((t,i) => `<div class="t-row"><span class="t-label">${t}</span><div class="t-bar-wrap"><div class="t-bar" style="width:${p.tv?p.tv[i]||70:70}%"></div></div></div>`).join('');
}

function renderCtxBlock() {
  const p = getProj(curProj);
  document.getElementById('ctx-block').textContent = p ? (p.context||'').slice(0,180)+'…' : 'Kein Projekt aktiv.';
}

// ═══════════════════════════ PROJECT MODAL ══════════════════════
function renderColorPicker() {
  document.getElementById('color-picker').innerHTML = SWATCHES.map(c => `<div class="swatch ${c===selColor?'sel':''}" style="background:${c}" onclick="selCol('${c}')"></div>`).join('');
}
function selCol(c) { selColor=c; renderColorPicker(); }

function openNewProjModal() {
  editProjId=null;
  document.getElementById('proj-modal-title').textContent='Neues Projekt';
  document.getElementById('pj-name').value=''; document.getElementById('pj-ctx').value='';
  document.getElementById('pj-tensions').value=''; document.getElementById('pj-focus').value='';
  document.getElementById('pj-del-btn').style.display='none';
  selColor=SWATCHES[0]; renderColorPicker();
  document.getElementById('proj-modal').classList.add('show');
}

function openEditProjModal(id) {
  const p=customProjs[id]; if(!p) return;
  editProjId=id;
  document.getElementById('proj-modal-title').textContent='Projekt bearbeiten';
  document.getElementById('pj-name').value=p.name; document.getElementById('pj-ctx').value=p.context||'';
  document.getElementById('pj-tensions').value=(p.tensions||[]).join('\n'); document.getElementById('pj-focus').value=p.focus||'';
  document.getElementById('pj-del-btn').style.display='block';
  selColor=p.color||SWATCHES[0]; renderColorPicker();
  document.getElementById('proj-modal').classList.add('show');
}

function closeProjModal() { document.getElementById('proj-modal').classList.remove('show'); editProjId=null; }

async function saveProj() {
  const name=document.getElementById('pj-name').value.trim();
  if(!name){alert('Projektname fehlt.');return;}
  const tensions=document.getElementById('pj-tensions').value.split('\n').map(l=>l.trim()).filter(Boolean);
  const id=editProjId||('custom_'+Date.now());
  const proj={id, name:name.toUpperCase(), color:selColor, context:document.getElementById('pj-ctx').value.trim(), tensions, tension_values:tensions.map(()=>70), focus:document.getElementById('pj-focus').value.trim()};
  const {error}=await sbRequest('POST','projects',[proj]);
  if(error){alert('Speichern fehlgeschlagen.');}
  customProjs[id]={...proj,builtin:false,tv:proj.tension_values};
  closeProjModal(); renderProjSwitcher();
  if(editProjId===curProj){renderTensionMap();renderCtxBlock();}
  selectProj(id); showFlash('Projekt gespeichert ✓');
}

async function deleteProj() {
  if(!editProjId||!confirm('Projekt löschen?'))return;
  await sbRequest('DELETE','sessions',null,'project_id=eq.'+editProjId);
  await sbRequest('DELETE','projects',null,'id=eq.'+editProjId);
  delete customProjs[editProjId]; closeProjModal();
  if(curProj===editProjId){curProj=null;curSess=null;history=[];renderProjSwitcher();showWelcome();}
  else renderProjSwitcher();
}

// ═══════════════════════════ SESSIONS ═══════════════════════════
async function loadSessMeta() {
  if(!curProj)return;
  const {data}=await sbRequest('GET','sessions',null,'project_id=eq.'+curProj+'&order=updated_at.desc&select=id,project_id,title,mode,msg_count,updated_at');
  sessMeta={}; if(data&&Array.isArray(data)) data.forEach(s=>{sessMeta[s.id]=s;});
}

function renderSessList() {
  const list=document.getElementById('sess-list');
  const sessions=Object.values(sessMeta).filter(s=>s.project_id===curProj).sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at));
  document.getElementById('sess-count').textContent=sessions.length;
  list.innerHTML=sessions.length===0?'<div style="font-size:0.58rem;color:var(--muted);padding:4px 0">Noch keine Sessions.</div>':
    sessions.map(s=>`<div class="sess-item ${s.id===curSess?'active':''}" onclick="loadSession('${s.id}')">
      <div><div class="sess-title">${s.title||'Session'}</div><div class="sess-meta">${new Date(s.updated_at).toLocaleDateString('de-DE')} · ${s.msg_count||0} Msg</div></div>
      <button class="sess-del" onclick="delSession('${s.id}',event)">×</button></div>`).join('');
}

async function saveSession() {
  if(!curProj)return;
  if(!curSess) curSess='sess_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  const firstUser=history.find(m=>m.role==='user');
  const title=firstUser?firstUser.content.slice(0,46)+(firstUser.content.length>46?'…':''):'Session · '+new Date().toLocaleDateString('de-DE');
  const payload={id:curSess,project_id:curProj,title,mode:curMode,history,msg_count:history.length,updated_at:new Date().toISOString()};
  const {error}=await sbRequest('POST','sessions',[payload]);
  if(!error){sessMeta[curSess]={...payload};renderSessList();showFlash();}
  else alert('Speichern fehlgeschlagen: '+JSON.stringify(error));
}

async function loadSession(id) {
  const {data}=await sbRequest('GET','sessions',null,'id=eq.'+id+'&select=*');
  if(!data||!data[0])return;
  const s=data[0]; curSess=id; history=s.history||[]; setMode(s.mode||'sparring');
  rebuildUI(); renderSessList();
}

async function delSession(id,e) {
  e.stopPropagation(); if(!confirm('Session löschen?'))return;
  await sbRequest('DELETE','sessions',null,'id=eq.'+id);
  delete sessMeta[id]; if(curSess===id) newSession(); else renderSessList();
}

function newSession() { curSess=null; history=[]; setMode('sparring'); renderSessList(); renderNewSessWelcome(); }

function renderNewSessWelcome() {
  const p=getProj(curProj);
  document.getElementById('conv').innerHTML=`<div class="msg ai">
    <div class="av av-ai">SM</div>
    <div class="msg-body">
      <div class="msg-meta">Sparring Machine · ${p?p.name:'Neue Session'}</div>
      <div class="bubble"><div class="ltag lt-why">WHY — Einstieg</div>Neue Session für <strong>${p?p.name:'dieses Projekt'}</strong>.\n\nBringt rein was auf dem Tisch liegt — roh ist gut.</div>
      <div class="chips">
        <button class="chip cw" onclick="useChip(this)">→ Ich versuche das WHY in einem Satz zu formulieren</button>
        <button class="chip" onclick="useChip(this)">→ Welche Annahmen müssen wir zuerst prüfen?</button>
        <button class="chip ch" onclick="useChip(this)">→ Welche Spannungen sind am produktivsten?</button>
      </div>
    </div>
  </div>`;
}

function rebuildUI() {
  const conv=document.getElementById('conv'); conv.innerHTML='';
  for(let i=0;i<history.length;i++){
    const m=history[i];
    if(m.role==='user') addMsg('user',m.content,null,false);
    else { const body=addMsg('ai',m.content,detectTag(m.content),false); if(i===history.length-1) addChips(extractChips(m.content),body); }
  }
  conv.scrollTop=99999;
}

// ═══════════════════════════ EXPORT ═════════════════════════════
function openExpModal(){expTab('full',document.querySelector('.mtab'));document.getElementById('exp-modal').classList.add('show');}
function closeExpModal(){document.getElementById('exp-modal').classList.remove('show');}

function expTab(type,btn) {
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active')); if(btn)btn.classList.add('active');
  const p=getProj(curProj), pn=p?p.name:'Unbekannt', date=new Date().toLocaleDateString('de-DE');
  if(type==='full'){
    let md=`# Sparring Session — ${pn}\n**Datum:** ${date} · **Modus:** ${MODES[curMode].label}\n\n---\n\n`;
    history.forEach(m=>{if(m.role==='user')md+=`### → Studio\n${m.content}\n\n`;else{const t=detectTag(m.content);if(t)md+=`**[${t.text}]**\n`;md+=`### Sparring Machine\n${m.content}\n\n---\n\n`;}});
    expContent=md;
  } else if(type==='insights'){
    let md=`# Erkenntnisse — ${pn} · ${date}\n\n## WHY\n\n_[Aus Session extrahieren]_\n\n## HOW\n\n_[Übersetzungen]_\n\n## WHAT\n\n_[Maßnahmen]_\n\n## Blinde Flecken\n\n_[Annahmen]_\n\n---\n\n`;
    history.filter(m=>m.role==='assistant').forEach((m,i)=>{const t=detectTag(m.content);md+=`### ${i+1}${t?' · '+t.text:''}\n${m.content.slice(0,400)}${m.content.length>400?'…':''}\n\n`;});
    expContent=md;
  } else {
    const allAI=history.filter(m=>m.role==='assistant').map(m=>m.content).join('\n');
    const qs=allAI.split('\n').filter(l=>l.trim().endsWith('?')&&l.trim().length>20);
    let md=`# Offene Fragen — ${pn} · ${date}\n\n`;
    qs.length?qs.forEach((q,i)=>{md+=`${i+1}. ${q.trim()}\n`;}):(md+='_Noch keine._\n');
    expContent=md;
  }
  document.getElementById('exp-pre').textContent=expContent;
}

function copyExp(){navigator.clipboard.writeText(expContent).then(()=>showFlash('Kopiert ✓'));}

// ═══════════════════════════ OBSIDIAN ═══════════════════════════
async function saveToObsidian() {
  if(!curProj){alert('Bitte Projekt wählen.');return;}
  if(!history.length){alert('Keine Session zum Speichern.');return;}
  const btn=document.getElementById('obs-btn'); btn.textContent='Speichert...'; btn.disabled=true;
  const p=getProj(curProj), date=new Date().toLocaleDateString('de-DE');
  let md=`# Sparring Session — ${p.name}\n**Datum:** ${date} · **Modus:** ${MODES[curMode].label}\n**Studio:** FRMTN (Nico & Chima)\n\n---\n\n`;
  history.forEach(m=>{if(m.role==='user')md+=`### → Studio\n${m.content}\n\n`;else{const t=detectTag(m.content);if(t)md+=`**[${t.text}]**\n`;md+=`### Sparring Machine\n${m.content}\n\n---\n\n`;}});
  const firstUser=history.find(m=>m.role==='user');
  const title=firstUser?firstUser.content.slice(0,50):'Session · '+date;
  try {
    const r=await fetch('https://sparring.frmtn.studio/save-note.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,project:p.name,content:md})});
    const d=await r.json();
    if(d.success)showFlash('In Obsidian gespeichert ✓'); else alert('Fehler: '+(d.error||'Unbekannt'));
  } catch(e){alert('Verbindungsfehler: '+e.message);}
  finally{btn.textContent='→ Obsidian';btn.disabled=false;}
}

// ═══════════════════════════ CONVERSATION ═══════════════════════
function setMode(mode) {
  curMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode-'+mode).classList.add('active');
}

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,130)+'px';}

function useChip(btn){
  const text=btn.textContent.replace('→ ','');
  document.getElementById('user-input').value=text;
  autoResize(document.getElementById('user-input'));
  sendMsg();
}

function addMsg(role,content,tag,animate=true){
  const conv=document.getElementById('conv'), isAI=role==='ai';
  const msg=document.createElement('div'); msg.className=`msg ${role}`; if(!animate)msg.style.animation='none';
  const av=document.createElement('div'); av.className=`av ${isAI?'av-ai':'av-usr'}`; av.textContent=isAI?'SM':'FM';
  const body=document.createElement('div'); body.className='msg-body';
  const meta=document.createElement('div'); meta.className='msg-meta';
  const p=getProj(curProj);
  meta.textContent=isAI?`Sparring · ${MODES[curMode].label}`:`FRMTN${p?' · '+p.name:''}`;
  const bubble=document.createElement('div'); bubble.className='bubble';
  if(tag){const tEl=document.createElement('div');tEl.className=`ltag ${tag.cls}`;tEl.textContent=tag.text;bubble.appendChild(tEl);}
  const txt=document.createElement('div');
  txt.innerHTML=content.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
  bubble.appendChild(txt); body.appendChild(meta); body.appendChild(bubble); msg.appendChild(av); msg.appendChild(body);
  conv.appendChild(msg); conv.scrollTop=conv.scrollHeight; return body;
}

function addChips(chips,container){
  const wrap=document.createElement('div'); wrap.className='chips';
  chips.forEach(c=>{const btn=document.createElement('button');btn.className=`chip ${c.type==='why'?'cw':c.type==='how'?'ch':''}`;btn.textContent='→ '+c.label;btn.onclick=()=>useChip(btn);wrap.appendChild(btn);});
  container.appendChild(wrap);
}

function detectTag(text){
  const t=text.toUpperCase();
  if(t.includes('[WHY')||t.includes('WHY —')||t.includes('WHY-'))return{cls:'lt-why',text:'WHY — Identitätskern'};
  if(t.includes('[HOW')||t.includes('HOW —'))return{cls:'lt-how',text:'HOW — Kulturelle Übersetzung'};
  if(t.includes('[WHAT')||t.includes('WHAT —'))return{cls:'lt-what',text:'WHAT — Maßnahmen'};
  if(t.includes('[BLIND')||t.includes('BLIND SPOT')||t.includes('BLINDE'))return{cls:'lt-blind',text:'BLIND SPOT'};
  if(t.includes('[SPANNUNG')||t.includes('SPANNUNG'))return{cls:'lt-tension',text:'SPANNUNG'};
  return null;
}

function extractChips(text){
  const chips=[];
  text.split('\n').forEach(line=>{
    if(line.trim().startsWith('→')||line.trim().startsWith('->')){
      const label=line.replace(/^[→\->]\s*/,'').trim();
      if(label.length>3&&label.length<80)chips.push({label,type:/why|warum/i.test(label)?'why':/how|wie/i.test(label)?'how':'neutral'});
    }
  });
  return chips;
}

async function sendMsg() {
  if(!curProj){alert('Bitte zuerst ein Projekt wählen.');return;}
  const input=document.getElementById('user-input'), btn=document.getElementById('send-btn');
  const text=input.value.trim(); if(!text)return;
  addMsg('user',text); history.push({role:'user',content:text});
  input.value=''; input.style.height='42px'; btn.disabled=true;
  const conv=document.getElementById('conv');
  const typing=document.createElement('div'); typing.className='typing'; typing.id='typing';
  typing.innerHTML='<span class="dots"><span>·</span><span>·</span><span>·</span></span> <span>Sparring Machine denkt...</span>';
  conv.appendChild(typing); conv.scrollTop=conv.scrollHeight;
  const p=getProj(curProj);
  const sys=MODES[curMode].sys+`\n\nPROJEKT: ${p.name}\nKONTEXT: ${p.context||''}\nSPANNUNGEN: ${(p.tensions||[]).join(', ')}\nFOKUS: ${p.focus||''}`;
  try {
    const res=await fetch('https://sparring.frmtn.studio/proxy.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:history})});
    const data=await res.json();
    document.getElementById('typing')?.remove();
    const aiText=data.content?.map(b=>b.text||'').join('\n')||'Keine Antwort erhalten.';
    history.push({role:'assistant',content:aiText});
    const tag=detectTag(aiText), body=addMsg('ai',aiText,tag);
    const chips=extractChips(aiText);
    addChips(chips.length>=2?chips.slice(0,3):[{label:'Ich antworte auf deine Frage',type:'neutral'},{label:'Zeig mir den nächsten blinden Fleck',type:'neutral'},{label:'Bohre tiefer ins WHY',type:'why'}],body);
    await saveSession();
  } catch(e){document.getElementById('typing')?.remove();addMsg('ai','Verbindungsfehler: '+e.message,null);}
  btn.disabled=false; input.focus();
}

function showFlash(msg){
  const el=document.getElementById('flash'); el.textContent=msg||'Gespeichert ✓';
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2000);
}

init();
</script>
</body>
