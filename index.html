<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparring Machine — FRMTN</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --ink: #0f0f0f; --paper: #f5f0e8; --warm: #e8dfc8;
    --accent: #c4401c; --accent2: #2a4a2a; --muted: #7a7060;
    --surface: #ede8dc; --border: #c8bfaa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Mono', monospace; background: var(--paper); color: var(--ink);
    min-height: 100vh; display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 280px 1fr;
    grid-template-areas: "header header" "sidebar main" "footer footer";
  }
  header {
    grid-area: header; display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    background: var(--ink); color: var(--paper); gap: 16px;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1rem; flex-shrink: 0; }
  .logo span { color: var(--accent); }
  .project-switcher-wrap { flex: 1; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .project-pill {
    display: flex; align-items: center; gap: 5px; padding: 4px 10px;
    border-radius: 2px; border: 1px solid #3a3a3a; background: #1a1a1a;
    font-family: 'DM Mono', monospace; font-size: 0.6rem; cursor: pointer;
    color: var(--paper); transition: all 0.15s; letter-spacing: 0.04em; white-space: nowrap;
  }
  .project-pill:hover { border-color: var(--accent); }
  .project-pill.active-project { border-color: var(--accent); background: #2a1008; color: #f5b8a0; }
  .project-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .new-project-pill {
    padding: 4px 10px; border-radius: 2px; border: 1px dashed #3a3a3a;
    background: transparent; font-family: 'DM Mono', monospace; font-size: 0.6rem;
    cursor: pointer; color: #666; transition: all 0.15s;
  }
  .new-project-pill:hover { border-color: var(--accent2); color: #8ab88a; }
  .header-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .hdr-btn {
    padding: 5px 10px; font-family: 'DM Mono', monospace; font-size: 0.58rem;
    border: 1px solid #3a3a3a; background: transparent; color: #a09888;
    border-radius: 2px; cursor: pointer; transition: all 0.15s;
  }
  .hdr-btn:hover { background: #1e1e1e; color: var(--paper); }
  .hdr-btn.accent { border-color: var(--accent); color: #f5b8a0; }
  .hdr-btn.accent:hover { background: var(--accent); color: #fff; }

  aside {
    grid-area: sidebar; border-right: 1px solid var(--border);
    background: var(--surface); overflow-y: auto;
    padding: 18px 14px; display: flex; flex-direction: column; gap: 20px;
  }
  .sidebar-section h3 {
    font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border);
  }
  .mode-buttons { display: flex; flex-direction: column; gap: 3px; }
  .mode-btn {
    padding: 7px 10px; border: 1px solid var(--border); background: transparent;
    font-family: 'DM Mono', monospace; font-size: 0.62rem; cursor: pointer;
    text-align: left; border-radius: 3px; color: var(--ink); transition: all 0.15s;
  }
  .mode-btn:hover { background: var(--warm); }
  .mode-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .mi { margin-right: 5px; }

  .session-list { display: flex; flex-direction: column; gap: 3px; max-height: 180px; overflow-y: auto; }
  .session-item {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 6px 8px; background: var(--warm); border: 1px solid var(--border);
    border-radius: 3px; cursor: pointer; font-size: 0.58rem; line-height: 1.4; transition: all 0.15s;
  }
  .session-item:hover { border-color: var(--accent); background: #fdf0ec; }
  .session-item.active-session { border-color: var(--accent); background: #fdf0ec; }
  .session-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px; }
  .session-meta { color: var(--muted); font-size: 0.52rem; margin-top: 1px; }
  .session-del { font-size: 0.7rem; color: var(--muted); background: none; border: none; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
  .session-del:hover { color: var(--accent); }
  .new-sess-btn {
    width: 100%; padding: 6px 8px; background: transparent; border: 1px dashed var(--border);
    border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 0.6rem;
    color: var(--muted); cursor: pointer; text-align: left; transition: all 0.15s; margin-top: 5px;
  }
  .new-sess-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .tension-map { display: flex; flex-direction: column; gap: 4px; }
  .tension-row { display: flex; align-items: center; gap: 6px; font-size: 0.58rem; color: var(--muted); }
  .tension-label { width: 95px; flex-shrink: 0; }
  .tension-bar-wrap { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .tension-bar { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.4s; }
  .context-block { padding: 8px 10px; background: var(--warm); border: 1px solid var(--border); border-radius: 3px; font-size: 0.6rem; color: var(--muted); line-height: 1.6; }
  .insight-count { display: inline-block; background: var(--accent); color: #fff; font-size: 0.48rem; padding: 1px 4px; border-radius: 8px; margin-left: 3px; vertical-align: middle; }

  main { grid-area: main; display: flex; flex-direction: column; overflow: hidden; max-height: calc(100vh - 53px - 52px); }
  .conversation-area { flex: 1; overflow-y: auto; padding: 24px 32px; display: flex; flex-direction: column; gap: 18px; }
  .msg { display: flex; gap: 10px; max-width: 800px; animation: fadeUp 0.22s ease-out; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 0.58rem; font-weight: 500; flex-shrink: 0; margin-top: 2px; }
  .avatar-ai { background: var(--ink); color: var(--paper); }
  .avatar-user { background: var(--accent); color: #fff; }
  .msg-body { flex: 1; }
  .msg-meta { font-size: 0.52rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .msg.user .msg-meta { text-align: right; }
  .msg-bubble { padding: 12px 16px; border-radius: 3px; font-size: 0.76rem; line-height: 1.75; white-space: pre-wrap; }
  .msg.ai .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-top-left-radius: 0; }
  .msg.user .msg-bubble { background: var(--ink); color: var(--paper); border-top-right-radius: 0; }
  .layer-tag { display: inline-block; font-size: 0.52rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 6px; border-radius: 2px; margin-bottom: 7px; }
  .lt-why { background: #fde8e3; color: var(--accent); border: 1px solid #f5c4b8; }
  .lt-how { background: #e3ede3; color: var(--accent2); border: 1px solid #b8d4b8; }
  .lt-what { background: #e3eaf5; color: #1a3a5a; border: 1px solid #b8c8e0; }
  .lt-blind { background: #fff3e0; color: #aa6600; border: 1px solid #f0d090; }
  .lt-tension { background: #f5e3f5; color: #6a2a6a; border: 1px solid #d4b8d4; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
  .chip { padding: 4px 9px; font-size: 0.6rem; border: 1px solid var(--border); background: var(--paper); color: var(--ink); border-radius: 2px; cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.12s; }
  .chip:hover { background: var(--ink); color: var(--paper); }
  .chip.cw:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip.ch:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .typing-indicator { display: flex; align-items: center; gap: 6px; font-size: 0.62rem; color: var(--muted); font-style: italic; padding: 6px 0; }
  .loading-dots span { animation: blink 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,100%{opacity:.2} 50%{opacity:1} }
  .input-area { border-top: 1px solid var(--border); padding: 14px 24px; background: var(--surface); display: flex; gap: 10px; align-items: flex-end; }
  .input-wrap { flex: 1; }
  textarea { width: 100%; padding: 10px 13px; font-family: 'DM Mono', monospace; font-size: 0.73rem; border: 1px solid var(--border); background: var(--paper); color: var(--ink); border-radius: 3px; resize: none; line-height: 1.6; min-height: 42px; max-height: 130px; transition: border-color 0.15s; }
  textarea:focus { outline: none; border-color: var(--ink); }
  textarea::placeholder { color: var(--muted); }
  .send-btn { padding: 10px 16px; background: var(--ink); color: var(--paper); border: none; font-family: 'DM Mono', monospace; font-size: 0.68rem; cursor: pointer; border-radius: 3px; transition: background 0.15s; height: 42px; }
  .send-btn:hover { background: var(--accent); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  footer { grid-area: footer; border-top: 1px solid var(--border); background: var(--ink); padding: 9px 24px; display: flex; align-items: center; justify-content: space-between; color: var(--muted); font-size: 0.58rem; letter-spacing: 0.07em; }

  /* MODALS */
  .overlay { position: fixed; inset: 0; background: rgba(15,15,15,0.8); display: none; align-items: center; justify-content: center; z-index: 300; }
  .overlay.show { display: flex; }
  .modal { background: var(--paper); border: 1px solid var(--border); border-radius: 4px; width: 640px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-hdr { padding: 14px 18px; border-bottom: 1px solid var(--border); background: var(--ink); color: var(--paper); display: flex; justify-content: space-between; align-items: center; }
  .modal-hdr h2 { font-family: 'DM Serif Display', serif; font-size: 0.95rem; font-weight: normal; }
  .modal-close { background: none; border: none; color: #666; font-size: 1.1rem; cursor: pointer; padding: 2px 6px; }
  .modal-close:hover { color: var(--paper); }
  .modal-body { padding: 18px; overflow-y: auto; flex: 1; }
  .modal-ftr { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; background: var(--surface); }
  .modal-btn { padding: 7px 13px; font-family: 'DM Mono', monospace; font-size: 0.63rem; border: 1px solid var(--border); background: transparent; cursor: pointer; border-radius: 2px; color: var(--ink); transition: all 0.15s; }
  .modal-btn:hover { background: var(--warm); }
  .modal-btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .modal-btn.primary:hover { background: var(--accent); border-color: var(--accent); }
  .modal-btn.danger { border-color: #d04020; color: var(--accent); }
  .modal-btn.danger:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .form-input, .form-textarea { width: 100%; padding: 9px 12px; font-family: 'DM Mono', monospace; font-size: 0.7rem; border: 1px solid var(--border); background: var(--warm); color: var(--ink); border-radius: 3px; }
  .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--ink); }
  .form-textarea { resize: vertical; min-height: 70px; line-height: 1.6; }
  .form-hint { font-size: 0.56rem; color: var(--muted); margin-top: 4px; }
  .color-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .color-swatch { width: 22px; height: 22px; border-radius: 2px; cursor: pointer; border: 2px solid transparent; transition: all 0.12s; }
  .color-swatch.selected { border-color: var(--ink); transform: scale(1.1); }
  .modal-tabs { display: flex; gap: 3px; margin-bottom: 14px; }
  .modal-tab { padding: 5px 11px; font-family: 'DM Mono', monospace; font-size: 0.6rem; border: 1px solid var(--border); background: transparent; cursor: pointer; border-radius: 2px; color: var(--muted); }
  .modal-tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .export-preview { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 14px; font-size: 0.65rem; line-height: 1.8; white-space: pre-wrap; max-height: 300px; overflow-y: auto; font-family: 'DM Mono', monospace; color: var(--ink); }
  .save-flash { position: fixed; bottom: 64px; right: 20px; background: var(--accent2); color: #fff; font-family: 'DM Mono', monospace; font-size: 0.58rem; padding: 5px 11px; border-radius: 3px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 400; }
  .save-flash.show { opacity: 1; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #666; display: inline-block; margin-right: 6px; }
  .status-dot.connected { background: #4a9; }
  .status-dot.error { background: var(--accent); }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="save-flash" id="save-flash">Gespeichert ✓</div>

<!-- PROJECT MODAL -->
<div class="overlay" id="project-modal" onclick="if(event.target===this)closeProjectModal()">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="project-modal-title">Neues Projekt anlegen</h2>
      <button class="modal-close" onclick="closeProjectModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Projektname</label>
        <input class="form-input" id="proj-name" placeholder="z.B. THE HUNDRED, HUNGRIG, Temple Lodge...">
      </div>
      <div class="form-group">
        <label class="form-label">Projektfarbe</label>
        <div class="color-picker" id="color-picker"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Basis-Kontext</label>
        <textarea class="form-textarea" id="proj-context" style="min-height:110px" placeholder="Briefing, Kernthesen, Ausgangslage — je mehr, desto präziser das Sparring."></textarea>
        <div class="form-hint">Rohtextformat ist gut. Copy-paste aus Docs, Mails, Notizen.</div>
      </div>
      <div class="form-group">
        <label class="form-label">Strategische Spannungen <span style="font-weight:normal;color:var(--muted)">(eine pro Zeile, Format: A vs. B)</span></label>
        <textarea class="form-textarea" id="proj-tensions" placeholder="Herkunft vs. Zukunft&#10;Nische vs. Kulturrelevanz&#10;Verband vs. Marke"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Sparring-Fokus <span style="font-weight:normal;color:var(--muted)">(optional)</span></label>
        <input class="form-input" id="proj-focus" placeholder="z.B. WHY-Kern herausarbeiten / Positionierung schärfen">
      </div>
    </div>
    <div class="modal-ftr">
      <button class="modal-btn danger" id="proj-delete-btn" onclick="deleteCurrentProject()" style="display:none;margin-right:auto">Projekt löschen</button>
      <button class="modal-btn" onclick="closeProjectModal()">Abbrechen</button>
      <button class="modal-btn primary" onclick="saveProject()">Speichern ↗</button>
    </div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="overlay" id="export-modal" onclick="if(event.target===this)closeExportModal()">
  <div class="modal">
    <div class="modal-hdr">
      <h2>Session exportieren</h2>
      <button class="modal-close" onclick="closeExportModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-tabs">
        <button class="modal-tab active" onclick="switchExportTab('full',this)">Vollständig</button>
        <button class="modal-tab" onclick="switchExportTab('insights',this)">Erkenntnisse</button>
        <button class="modal-tab" onclick="switchExportTab('questions',this)">Offene Fragen</button>
      </div>
      <div class="export-preview" id="export-preview"></div>
    </div>
    <div class="modal-ftr">
      <button class="modal-btn" onclick="closeExportModal()">Schließen</button>
      <button class="modal-btn primary" onclick="copyExport()">In Zwischenablage ↗</button>
    </div>
  </div>
</div>

<header>
  <div class="logo">FRMTN <span style="font-family:'DM Mono';font-size:0.65rem;color:#555">/ Sparring</span></div>
  <div class="project-switcher-wrap" id="project-switcher-wrap"></div>
  <div class="header-actions">
    <button class="hdr-btn" onclick="openExportModal()">Export ↓</button>
    <button class="hdr-btn" id="obsidian-btn" onclick="saveToObsidian()">→ Obsidian</button>
    <button class="hdr-btn" onclick="saveToObsidian()" id="obsidian-btn">→ Obsidian</button>
    <button class="hdr-btn accent" onclick="saveCurrentSession()">Speichern ✓</button>
  </div>
</header>

<aside>
  <div class="sidebar-section">
    <h3>Modus</h3>
    <div class="mode-buttons">
      <button class="mode-btn active" onclick="setMode('sparring')" id="mode-sparring"><span class="mi">⚡</span>Strategisches Sparring</button>
      <button class="mode-btn" onclick="setMode('blindspot')" id="mode-blindspot"><span class="mi">◉</span>Blinde Flecken</button>
      <button class="mode-btn" onclick="setMode('why')" id="mode-why"><span class="mi">○</span>WHY-Kern bohren</button>
      <button class="mode-btn" onclick="setMode('tension')" id="mode-tension"><span class="mi">⊗</span>Spannungen kartieren</button>
      <button class="mode-btn" onclick="setMode('derive')" id="mode-derive"><span class="mi">→</span>Ableitungen entwickeln</button>
    </div>
  </div>
  <div class="sidebar-section">
    <h3>Sessions <span class="insight-count" id="session-count">0</span></h3>
    <div class="session-list" id="session-list"></div>
    <button class="new-sess-btn" onclick="newSession()">+ Neue Session</button>
  </div>
  <div class="sidebar-section">
    <h3>Spannungen</h3>
    <div class="tension-map" id="tension-map"><div style="font-size:0.58rem;color:var(--muted)">Projekt wählen.</div></div>
  </div>
  <div class="sidebar-section">
    <h3>Kontext</h3>
    <div class="context-block" id="context-preview">Kein Projekt aktiv.</div>
  </div>
</aside>

<main>
  <div class="conversation-area" id="conversation"></div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="user-input" placeholder="Erkenntnisse, Hypothesen, Fragen — roh ist gut..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
        oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">Sparring ↗</button>
  </div>
</main>

<footer>
  <span id="footer-project">FRMTN space_available · Strategic Sparring Machine</span>
  <span><span class="status-dot" id="status-dot"></span><span id="footer-mode">Verbinde mit Supabase...</span></span>
</footer>

<script>
// ═══════════════════════════════════════════════════════
// SUPABASE CONFIG
// ═══════════════════════════════════════════════════════
const SUPABASE_URL = 'https://gmttqlxqvqdukuspghoc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_J-h6m1YD8Ad4nCE5IMKZcw_SZfQd4Ep';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ═══════════════════════════════════════════════════════
// BUILTIN PROJECTS
// ═══════════════════════════════════════════════════════
const BUILTIN_PROJECTS = {
  demeter: {
    id: 'demeter', name: 'DEMETER', color: '#c4401c', builtin: true,
    context: `Markenstrategie Demeter 2026 (Brief Nico & Chima an Nancy Schacht, Mai 2026). Demeter ist biodynamischer Landwirtschaftsverband, Wertegemeinschaft, Lizenzsystem und Co-Marke gleichzeitig. 11 Kernthesen: (1) Keine klassische Produktmarke. (2) Nach außen Nachfrage erzeugen UND nach innen orientieren. (3) 100 Jahre biodynamische Landwirtschaft, alte Codes reichen nicht mehr — "Feuer weitertragen statt Asche huldigen". (4) Jünger werden durch neue kulturelle Übersetzungen. (5) Fachhandel schwächelt — neue Resonanzräume nötig. (6) Brand Marketing vor Trade Marketing. (7) Kommunikative Souveränität bei Kritik. (8) Mehr Daten statt Bauchgefühl. (9) Aus Bio-Bubble herausdenken. (10) Logo-Frage nachgelagert. (11) 2028 Jubiläum als Zielpunkt.`,

  },
  temple: {
    id: 'temple', name: 'TEMPLE LODGE', color: '#1a3a5a', builtin: true,
    context: `Temple Lodge: Hospitality/Wellness-Konzept für regenerative Performance und Community. Hochwertige Rückzugs- und Gemeinschaftserlebnisse für Menschen, die Leistung und Erholung neu denken.`,
    tensions: ['Rückzug vs. Community','Premium vs. Zugänglichkeit','Performance vs. Erholung','Natur vs. Urbanität'],
    tension_values: [70,80,85,60],
    focus: 'Positionierung und kulturelle Verortung'
  },
  hungrig: {
    id: 'hungrig', name: 'HUNGRIG', color: '#2a4a2a', builtin: true,
    context: `HUNGRIG: Aktives Projekt im Portfolio von FRMTN. Details werden in der Session eingebracht.`,
    tensions: ['Produkt vs. Haltung','Lokal vs. Skalierbar'],
    tension_values: [75,65],
    focus: 'Strategische Grundlage und Differenzierung'
  },
  hundred: {

const MODES = {

  derive: { label: 'Ableitungen entwickeln', sys: `Hilf FRMTN, aus Erkenntnissen Ableitungen zu entwickeln. Golden Circle WHY → HOW → WHAT. Struktur: → Einordnung [WHY/HOW/WHAT] → Ableitungen → Offene Fragen → Nächster Schritt. "→ ..." Folgefragen. Deutsch.` }
};

// STATE

let currentProjectId = null;
let customProjects = {};
let currentSessionId = null;
let sessionMeta = {};
let conversationHistory = [];
let currentMode = 'sparring';
let exportContent = '';
let editingProjectId = null;
let selectedColor = SWATCHES[0];

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
async async function init() {
  renderColorPicker();
  // Builtin-Projekte sofort rendern — kein Warten auf Supabase
  renderProjectSwitcher();
  showWelcome();
  // Dann Supabase im Hintergrund laden
  try {
    const { data, error } = await sb.from('projects').select('*').order('created_at');
    if (!error && data) {
      data.forEach(p => { customProjects[p.id] = { ...p, builtin: false, tensions: p.tensions || [], tension_values: p.tension_values || [] }; });
      renderProjectSwitcher(); // nochmal rendern mit custom projects
    }
    setStatus('connected', 'Verbunden · Supabase');
  } catch(e) {
    setStatus('error', 'Offline — nur Builtin-Projekte verfügbar');
  }
}

function setStatus(state, text) {
  document.getElementById('status-dot').className = 'status-dot ' + state;
  document.getElementById('footer-mode').textContent = text;
}

function showWelcome() {
  const conv = document.getElementById('conversation');
  conv.innerHTML = `<div class="msg ai">
    <div class="msg-avatar avatar-ai">SM</div>
    <div class="msg-body">
      <div class="msg-meta">Sparring Machine · Start</div>
      <div class="msg-bubble"><div class="layer-tag lt-why">WHY — Identitätskern</div>Projekt wählen — oben in der Leiste. Dann gehts los.\n\nJedes Projekt hat seinen eigenen Kontext, seine eigenen Spannungen, seine eigene Session-Historie — gespeichert in Supabase.</div>
      <div class="chips">
        <button class="chip cw" onclick="selectProject('demeter')">→ DEMETER öffnen</button>
        <button class="chip ch" onclick="openNewProjectModal()">→ Neues Projekt anlegen</button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// PROJECTS
// ═══════════════════════════════════════════════════════
function allProjects() {
  return [...Object.values(BUILTIN_PROJECTS), ...Object.values(customProjects)];
}

function getProject(id) {
  return BUILTIN_PROJECTS[id] || customProjects[id] || null;
}

function renderProjectSwitcher() {
  const wrap = document.getElementById('project-switcher-wrap');
  wrap.innerHTML = '';
  allProjects().forEach(p => {
    const pill = document.createElement('button');
    pill.className = 'project-pill' + (p.id === currentProjectId ? ' active-project' : '');
    pill.innerHTML = `<span class="project-dot" style="background:${p.color}"></span>${p.name}`;
    pill.onclick = () => selectProject(p.id);
    if (!p.builtin) pill.ondblclick = (e) => { e.stopPropagation(); openEditProjectModal(p.id); };
    wrap.appendChild(pill);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'new-project-pill';
  addBtn.textContent = '+ Projekt';
  addBtn.onclick = openNewProjectModal;
  wrap.appendChild(addBtn);
}

async function selectProject(id) {
  if (currentProjectId === id) return;
  currentProjectId = id;
  currentSessionId = null;
  conversationHistory = [];
  setMode('sparring');
  renderProjectSwitcher();
  renderTensionMap();
  renderContextPreview();
  await loadSessionMeta();
  renderSessionList();
  renderNewSessionWelcome();
  const p = getProject(id);
  document.getElementById('footer-project').textContent = `FRMTN · ${p.name}`;
}

function renderTensionMap() {
  const el = document.getElementById('tension-map');
  const p = getProject(currentProjectId);
  if (!p || !p.tensions || p.tensions.length === 0) { el.innerHTML = '<div style="font-size:0.58rem;color:var(--muted)">Keine Spannungen definiert.</div>'; return; }
  el.innerHTML = p.tensions.map((t, i) => {
    const val = p.tension_values ? (p.tension_values[i] || 70) : 70;
    return `<div class="tension-row"><span class="tension-label">${t}</span><div class="tension-bar-wrap"><div class="tension-bar" style="width:${val}%"></div></div></div>`;
  }).join('');
}

function renderContextPreview() {
  const el = document.getElementById('context-preview');
  const p = getProject(currentProjectId);
  if (!p) { el.textContent = 'Kein Projekt aktiv.'; return; }
  el.textContent = p.context ? p.context.slice(0,180) + (p.context.length > 180 ? '…' : '') : 'Kein Kontext definiert.';
}

// ═══════════════════════════════════════════════════════
// PROJECT MODAL
// ═══════════════════════════════════════════════════════
function renderColorPicker() {
  document.getElementById('color-picker').innerHTML = SWATCHES.map(c =>
    `<div class="color-swatch ${c===selectedColor?'selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
  ).join('');
}
function selectColor(c) { selectedColor = c; renderColorPicker(); }

function openNewProjectModal() {
  editingProjectId = null;
  document.getElementById('project-modal-title').textContent = 'Neues Projekt anlegen';
  document.getElementById('proj-name').value = '';
  document.getElementById('proj-context').value = '';
  document.getElementById('proj-tensions').value = '';
  document.getElementById('proj-focus').value = '';
  document.getElementById('proj-delete-btn').style.display = 'none';
  selectedColor = SWATCHES[0]; renderColorPicker();
  document.getElementById('project-modal').classList.add('show');
}

function openEditProjectModal(id) {
  const p = customProjects[id]; if (!p) return;
  editingProjectId = id;
  document.getElementById('project-modal-title').textContent = 'Projekt bearbeiten';
  document.getElementById('proj-name').value = p.name;
  document.getElementById('proj-context').value = p.context || '';
  document.getElementById('proj-tensions').value = (p.tensions||[]).join('\n');
  document.getElementById('proj-focus').value = p.focus || '';
  document.getElementById('proj-delete-btn').style.display = 'block';
  selectedColor = p.color || SWATCHES[0]; renderColorPicker();
  document.getElementById('project-modal').classList.add('show');
}

function closeProjectModal() { document.getElementById('project-modal').classList.remove('show'); editingProjectId = null; }

async function saveProject() {
  const name = document.getElementById('proj-name').value.trim();
  if (!name) { alert('Projektname fehlt.'); return; }
  const tensions = document.getElementById('proj-tensions').value.split('\n').map(l=>l.trim()).filter(Boolean);
  const id = editingProjectId || ('custom_' + Date.now());
  const proj = { id, name: name.toUpperCase(), color: selectedColor, context: document.getElementById('proj-context').value.trim(), tensions, tension_values: tensions.map(()=>70), focus: document.getElementById('proj-focus').value.trim() };
  const { error } = editingProjectId
    ? await sb.from('projects').update(proj).eq('id', id)
    : await sb.from('projects').insert(proj);
  if (error) { alert('Speichern fehlgeschlagen: ' + error.message); return; }
  customProjects[id] = { ...proj, builtin: false };
  closeProjectModal();
  renderProjectSwitcher();
  if (editingProjectId === currentProjectId) { renderTensionMap(); renderContextPreview(); }
  selectProject(id);
  showSaveFlash('Projekt gespeichert ✓');
}

async function deleteCurrentProject() {
  if (!editingProjectId || !confirm('Projekt und alle Sessions wirklich löschen?')) return;
  await sb.from('sessions').delete().eq('project_id', editingProjectId);
  await sb.from('projects').delete().eq('id', editingProjectId);
  delete customProjects[editingProjectId];
  closeProjectModal();
  if (currentProjectId === editingProjectId) { currentProjectId = null; currentSessionId = null; conversationHistory = []; renderProjectSwitcher(); showWelcome(); }
  else renderProjectSwitcher();
}

// ═══════════════════════════════════════════════════════
// SESSIONS
// ═══════════════════════════════════════════════════════
async function loadSessionMeta() {
  if (!currentProjectId) return;
  const { data } = await sb.from('sessions').select('id,project_id,title,mode,msg_count,updated_at').eq('project_id', currentProjectId).order('updated_at', { ascending: false });
  sessionMeta = {};
  if (data) data.forEach(s => { sessionMeta[s.id] = s; });
}

function renderSessionList() {
  const list = document.getElementById('session-list');
  const sessions = Object.values(sessionMeta).filter(s => s.project_id === currentProjectId).sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
  document.getElementById('session-count').textContent = sessions.length;
  list.innerHTML = sessions.length === 0
    ? '<div style="font-size:0.58rem;color:var(--muted);padding:4px 0">Noch keine Sessions.</div>'
    : sessions.map(s => `<div class="session-item ${s.id===currentSessionId?'active-session':''}" onclick="loadSession('${s.id}')">
        <div><div class="session-title">${s.title||'Session'}</div><div class="session-meta">${new Date(s.updated_at).toLocaleDateString('de-DE')} · ${s.msg_count||0} Msg</div></div>
        <button class="session-del" onclick="deleteSession('${s.id}',event)">×</button>
      </div>`).join('');
}

async function saveCurrentSession() {
  if (!currentProjectId) return;
  if (!currentSessionId) currentSessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  const firstUser = conversationHistory.find(m => m.role === 'user');
  const title = firstUser ? firstUser.content.slice(0,46) + (firstUser.content.length>46?'…':'') : 'Session · ' + new Date().toLocaleDateString('de-DE');
  const payload = { id: currentSessionId, project_id: currentProjectId, title, mode: currentMode, history: conversationHistory, msg_count: conversationHistory.length, updated_at: new Date().toISOString() };
  const { error } = await sb.from('sessions').upsert(payload);
  if (error) { console.error('Save error:', error); return; }
  sessionMeta[currentSessionId] = { ...payload };
  renderSessionList();
  showSaveFlash();
}

async function loadSession(id) {
  const { data, error } = await sb.from('sessions').select('*').eq('id', id).single();
  if (error || !data) return;
  currentSessionId = id;
  conversationHistory = data.history || [];
  setMode(data.mode || 'sparring');
  rebuildUI();
  renderSessionList();
}

async function deleteSession(id, e) {
  e.stopPropagation();
  if (!confirm('Session löschen?')) return;
  await sb.from('sessions').delete().eq('id', id);
  delete sessionMeta[id];
  if (currentSessionId === id) newSession(); else renderSessionList();
}

function newSession() {
  currentSessionId = null;
  conversationHistory = [];
  setMode('sparring');
  renderSessionList();
  renderNewSessionWelcome();
}

function renderNewSessionWelcome() {
  const p = getProject(currentProjectId);
  document.getElementById('conversation').innerHTML = `<div class="msg ai">
    <div class="msg-avatar avatar-ai">SM</div>
    <div class="msg-body">
      <div class="msg-meta">Sparring Machine · ${p?p.name:'Neue Session'}</div>
      <div class="msg-bubble"><div class="layer-tag lt-why">WHY — Einstieg</div>Neue Session für <strong>${p?p.name:'dieses Projekt'}</strong>.\n\nBringt rein was auf dem Tisch liegt — eine Erkenntnis, eine Frage, eine Hypothese. Roh ist gut.</div>
      <div class="chips">
        <button class="chip cw" onclick="useChip(this)">→ Ich versuche das WHY in einem Satz zu formulieren</button>
        <button class="chip" onclick="useChip(this)">→ Welche Annahmen müssen wir zuerst prüfen?</button>
        <button class="chip ch" onclick="useChip(this)">→ Welche Spannungen sind am produktivsten?</button>
      </div>
    </div>
  </div>`;
}

function rebuildUI() {
  const conv = document.getElementById('conversation');
  conv.innerHTML = '';
  for (let i = 0; i < conversationHistory.length; i++) {
    const m = conversationHistory[i];
    if (m.role === 'user') addMsg('user', m.content, null, false);
    else {
      const body = addMsg('ai', m.content, detectTag(m.content), false);
      if (i === conversationHistory.length - 1) addChips(extractChips(m.content), body);
    }
  }
  document.getElementById('conversation').scrollTop = 99999;
}

// ═══════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════
function openExportModal() { switchExportTab('full', document.querySelector('.modal-tab')); document.getElementById('export-modal').classList.add('show'); }
function closeExportModal() { document.getElementById('export-modal').classList.remove('show'); }

function switchExportTab(type, btn) {
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const p = getProject(currentProjectId);
  const pname = p ? p.name : 'Unbekannt';
  const date = new Date().toLocaleDateString('de-DE');
  if (type === 'full') {
    let md = `# Sparring Session — ${pname}\n**Datum:** ${date} · **Modus:** ${MODES[currentMode].label}\n\n---\n\n`;
    conversationHistory.forEach(m => {
      if (m.role === 'user') md += `### → Studio\n${m.content}\n\n`;
      else { const t=detectTag(m.content); if(t) md+=`**[${t.text}]**\n`; md+=`### Sparring Machine\n${m.content}\n\n---\n\n`; }
    });
    exportContent = md;
  } else if (type === 'insights') {
    let md = `# Erkenntnisse — ${pname} · ${date}\n\n## WHY — Identitätskern\n\n_[Aus der Session extrahieren]_\n\n## HOW — Kulturelle Übersetzung\n\n_[Wie werden Werte in neue Kontexte übersetzt?]_\n\n## WHAT — Maßnahmen\n\n_[Konkrete Ableitungen]_\n\n## Blinde Flecken\n\n_[Aufgedeckte Annahmen]_\n\n---\n\n## Rohe Erkenntnisse aus Session:\n\n`;
    conversationHistory.filter(m=>m.role==='assistant').forEach((m,i) => { const t=detectTag(m.content); md+=`### ${i+1}${t?' · '+t.text:''}\n${m.content.slice(0,400)}${m.content.length>400?'…':''}\n\n`; });
    exportContent = md;
  } else {
    const allAI = conversationHistory.filter(m=>m.role==='assistant').map(m=>m.content).join('\n');
    const qs = allAI.split('\n').filter(l=>l.trim().endsWith('?')&&l.trim().length>20);
    const chips = allAI.split('\n').filter(l=>l.trim().startsWith('→'));
    let md = `# Offene Fragen — ${pname} · ${date}\n\n`;
    qs.length>0 ? qs.forEach((q,i)=>{md+=`${i+1}. ${q.trim()}\n`;}) : (md+='_Noch keine Fragen in dieser Session._\n');
    md += `\n---\n\n## Nächste Schritte:\n\n`; chips.slice(0,12).forEach(l=>{md+=`- ${l.trim()}\n`;});
    exportContent = md;
  }
  document.getElementById('export-preview').textContent = exportContent;
}

function copyExport() { navigator.clipboard.writeText(exportContent).then(()=>showSaveFlash('Kopiert ✓')); }

// ═══════════════════════════════════════════════════════
// CONVERSATION
// ═══════════════════════════════════════════════════════
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode-'+mode).classList.add('active');
  setStatus('connected', `${MODES[mode].label} · Supabase`);
}

function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,130)+'px'; }

function useChip(btn) {
  const text = btn.textContent.replace('→ ','');
  document.getElementById('user-input').value = text;
  autoResize(document.getElementById('user-input'));
  sendMessage();
}

function addMsg(role, content, tag, animate=true) {
  const conv = document.getElementById('conversation');
  const isAI = role==='ai';
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  if (!animate) msg.style.animation = 'none';
  const av = document.createElement('div');
  av.className = `msg-avatar ${isAI?'avatar-ai':'avatar-user'}`;
  av.textContent = isAI?'SM':'FM';
  const body = document.createElement('div');
  body.className = 'msg-body';
  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  const p = getProject(currentProjectId);
  meta.textContent = isAI ? `Sparring · ${MODES[currentMode].label}` : `FRMTN${p?' · '+p.name:''}`;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (tag) { const tEl=document.createElement('div'); tEl.className=`layer-tag ${tag.cls}`; tEl.textContent=tag.text; bubble.appendChild(tEl); }
  const txt = document.createElement('div');
  txt.innerHTML = content.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
  bubble.appendChild(txt);
  body.appendChild(meta); body.appendChild(bubble);
  msg.appendChild(av); msg.appendChild(body);
  conv.appendChild(msg); conv.scrollTop=conv.scrollHeight;
  return body;
}

function addChips(chips, container) {
  const wrap = document.createElement('div');
  wrap.className = 'chips';
  chips.forEach(c => {
    const btn=document.createElement('button');
    btn.className=`chip ${c.type==='why'?'cw':c.type==='how'?'ch':''}`;
    btn.textContent='→ '+c.label;
    btn.onclick=()=>useChip(btn);
    wrap.appendChild(btn);
  });
  container.appendChild(wrap);
}

function detectTag(text) {
  const t=text.toUpperCase();
  if(t.includes('[WHY')||t.includes('WHY —')||t.includes('WHY-')) return {cls:'lt-why',text:'WHY — Identitätskern'};
  if(t.includes('[HOW')||t.includes('HOW —')) return {cls:'lt-how',text:'HOW — Kulturelle Übersetzung'};
  if(t.includes('[WHAT')||t.includes('WHAT —')) return {cls:'lt-what',text:'WHAT — Maßnahmen'};
  if(t.includes('[BLIND')||t.includes('BLIND SPOT')||t.includes('BLINDE')) return {cls:'lt-blind',text:'BLIND SPOT'};
  if(t.includes('[SPANNUNG')||t.includes('SPANNUNG')) return {cls:'lt-tension',text:'SPANNUNG'};
  return null;
}

function extractChips(text) {
  const chips=[];
  text.split('\n').forEach(line => {
    if(line.trim().startsWith('→')||line.trim().startsWith('->')) {
      const label=line.replace(/^[→\->]\s*/,'').trim();
      if(label.length>3&&label.length<80) chips.push({label,type:/why|warum/i.test(label)?'why':/how|wie/i.test(label)?'how':'neutral'});
    }
  });
  return chips;
}

async function sendMessage() {
  if (!currentProjectId) { alert('Bitte zuerst ein Projekt wählen.'); return; }
  const input = document.getElementById('user-input');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text) return;
  addMsg('user', text);
  conversationHistory.push({role:'user',content:text});
  input.value=''; input.style.height='42px'; btn.disabled=true;
  const conv=document.getElementById('conversation');
  const typing=document.createElement('div');
  typing.className='typing-indicator'; typing.id='typing';
  typing.innerHTML='<span class="loading-dots"><span>·</span><span>·</span><span>·</span></span> <span>Sparring Machine denkt...</span>';
  conv.appendChild(typing); conv.scrollTop=conv.scrollHeight;
  const p=getProject(currentProjectId);
  const projectCtx=`\n\nPROJEKT: ${p.name}\nKONTEXT: ${p.context||''}\nSPANNUNGEN: ${(p.tensions||[]).join(', ')}\nFOKUS: ${p.focus||''}`;
  const sys=MODES[currentMode].sys+projectCtx;
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:conversationHistory})});
    const data=await res.json();
    document.getElementById('typing')?.remove();
    const aiText=data.content?.map(b=>b.text||'').join('\n')||'Keine Antwort erhalten.';
    conversationHistory.push({role:'assistant',content:aiText});
    const tag=detectTag(aiText);
    const body=addMsg('ai',aiText,tag);
    const chips=extractChips(aiText);
    addChips(chips.length>=2?chips.slice(0,3):[{label:'Ich antworte auf deine Frage',type:'neutral'},{label:'Zeig mir den nächsten blinden Fleck',type:'neutral'},{label:'Bohre tiefer ins WHY',type:'why'}],body);
    await saveCurrentSession();
  } catch(e) {
    document.getElementById('typing')?.remove();
    addMsg('ai',`Verbindungsfehler: ${e.message}`,null);
  }
  btn.disabled=false; input.focus();
}

    }
  });
  const firstUser = conversationHistory.find(m => m.role === 'user');
  const title = firstUser ? firstUser.content.slice(0,50) : 'Session · ' + date;
  try {
    const res = await fetch('https://sparring.frmtn.studio/save-note.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, project: p.name, content: md })
    });
    const data = await res.json();
    if (data.success) { showSaveFlash('In Obsidian gespeichert ✓'); }
    else { alert('Fehler: ' + (data.error || 'Unbekannt')); }
  } catch(e) { alert('Verbindungsfehler: ' + e.message); }
  finally { btn.textContent = '→ Obsidian'; btn.disabled = false; }
}

function showSaveFlash(msg) {
  const el=document.getElementById('save-flash');
  el.textContent=msg||'Gespeichert ✓';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

init();
</script>
</body>
</html>
